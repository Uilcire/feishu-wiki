# Claude Code adapter
# Install: npm install -g @uilcire/ai-wiki
# Postinstall auto-registers to ~/.claude/skills/ai-wiki/

discovery:
  paths:
    - ~/.claude/skills/ai-wiki/
    - .claude/skills/ai-wiki/

policy:
  allow_implicit_invocation: true
  trigger_phrases:
    - "AI Wiki"
    - "知识库"
    - "收录"
    - "查询智能体"

invoke:
  cli: 'PATH="$HOME/.npm-global/bin:$PATH" ai-wiki'

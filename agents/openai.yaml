# OpenAI Codex adapter
# Install: npm install -g @uilcire/ai-wiki
# Postinstall auto-registers to ~/.codex/skills/ai-wiki/

discovery:
  paths:
    - ~/.codex/skills/ai-wiki/
    - .agents/skills/ai-wiki/

policy:
  allow_implicit_invocation: true

invoke:
  cli: "ai-wiki"

env:
  ensure_path: |
    # ai-wiki 和 lark-cli 都在 npm 全局目录下
    export PATH="$HOME/.npm-global/bin:$PATH"

notes: |
  Codex runs in a sandbox. Both ai-wiki and lark-cli must be
  npm-installed globally and reachable on PATH.
  Run `ai-wiki setup` to verify lark-cli + auth before first use.

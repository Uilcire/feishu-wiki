# OpenAI Codex adapter
# Install: npm install -g @uilcire/ai-wiki
# Postinstall auto-registers to ~/.codex/skills/ai-wiki/

discovery:
  paths:
    - ~/.codex/skills/ai-wiki/
    - .agents/skills/ai-wiki/

policy:
  allow_implicit_invocation: true

invoke:
  cli: 'PATH="$HOME/.npm-global/bin:$PATH" ai-wiki'

notes: |
  ai-wiki and lark-cli are both installed in ~/.npm-global/bin.
  The invoke command prepends this to PATH automatically.
  If ai-wiki is on a different path, adjust the PATH prefix accordingly.
  Run `ai-wiki setup` to verify lark-cli + auth before first use.

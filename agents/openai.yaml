# OpenAI Codex adapter
# Install: npm install -g @uilcire/ai-wiki
# Postinstall auto-registers to ~/.codex/skills/ai-wiki/

discovery:
  paths:
    - ~/.codex/skills/ai-wiki/
    - .agents/skills/ai-wiki/

policy:
  allow_implicit_invocation: true

invoke:
  cli: "ai-wiki"

notes: |
  Codex runs in a sandbox. Ensure @uilcire/ai-wiki is npm-installed
  globally and lark-cli is available on PATH.
